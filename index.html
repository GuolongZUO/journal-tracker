<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文献追踪器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;display:flex;height:100vh;overflow:hidden}
button{cursor:pointer;font-family:inherit}
#sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
#sidebar.closed{width:0}
#sb-head{padding:14px 14px 10px;border-bottom:1px solid #e5e5e5;flex-shrink:0}
#sb-head h3{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.sb-btns{display:flex;gap:6px}
.sb-btns button{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ddd;background:transparent;color:#555}
.sb-btns button:hover{background:#f0f0f0}
#sb-list{flex:1;overflow-y:auto;padding:8px 0}
.sb-group{margin-bottom:4px}
.sb-group-header{padding:6px 14px 4px;font-size:10px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:.08em}
.sb-item{display:flex;align-items:center;gap:8px;padding:5px 14px;cursor:pointer;user-select:none}
.sb-item:hover{background:#f7f7f7}
.sb-check{width:13px;height:13px;border-radius:3px;flex-shrink:0;border:1.5px solid #bbb;transition:all .15s}
.sb-check.on{border-color:transparent}
.sb-label{flex:1;font-size:12px;color:#333;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-count{font-size:11px;color:#bbb;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:11px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#menu-btn{font-size:15px;padding:5px 9px;border:1px solid #ddd;border-radius:7px;background:transparent;color:#555}
#menu-btn:hover{background:#f0f0f0}
#app-title{font-size:15px;font-weight:600;color:#1d1d1f;white-space:nowrap}
#updated{font-size:11px;color:#bbb;margin-left:8px}
.spacer{flex:1}
.day-btns{display:flex;gap:5px}
.day-btn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid #ddd;background:transparent;color:#555;transition:all .15s}
.day-btn.active{background:#0071e3;color:#fff;border-color:#0071e3;font-weight:500}
#search-box{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid #ddd;background:#f5f5f7;width:190px;outline:none}
#search-box:focus{border-color:#0071e3;background:#fff}
#refresh-btn{font-size:12px;padding:6px 16px;border-radius:20px;border:none;background:#0071e3;color:#fff;font-weight:500}
#refresh-btn:disabled{opacity:.5;cursor:default}
#status{padding:9px 16px;background:#f0f4ff;border-bottom:1px solid #dce4ff;font-size:12px;color:#3a5ccc;display:none;align-items:center;gap:8px}
#status.err{background:#fff0f0;border-color:#ffd0d0;color:#c0392b}
.spinner{width:13px;height:13px;border:2px solid #b0c0ff;border-top-color:#3a5ccc;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
#list-area{flex:1;overflow-y:auto;padding:14px 16px}
#list-meta{font-size:12px;color:#aaa;margin-bottom:11px}
.article-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:13px 15px;margin-bottom:8px}
.article-card:hover{border-color:#b0c8f0}
.article-title{font-size:13px;font-weight:500;color:#1d1d1f;line-height:1.45;margin-bottom:7px;display:block;text-decoration:none}
.article-title:hover{color:#0071e3}
.article-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.journal-badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.article-authors{font-size:11px;color:#999;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.article-date{font-size:11px;color:#bbb;flex-shrink:0;margin-left:auto}
#empty{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
#empty .icon{font-size:36px;margin-bottom:14px}
#empty p{font-size:14px;color:#555;margin-bottom:6px}
#empty small{font-size:12px;color:#aaa}
</style>
</head>
<body>
<div id="sidebar">
  <div id="sb-head">
    <h3>期刊分组</h3>
    <div class="sb-btns">
      <button onclick="selectAll()">全选</button>
      <button onclick="clearAll()">清空</button>
    </div>
  </div>
  <div id="sb-list"></div>
</div>

<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('closed')">☰</button>
    <span id="app-title">文献追踪器</span>
    <span id="updated"></span>
    <div class="spacer"></div>
    <div class="day-btns">
      <button class="day-btn" data-d="1" onclick="setDays(1)">今天</button>
      <button class="day-btn active" data-d="3" onclick="setDays(3)">近3天</button>
      <button class="day-btn" data-d="7" onclick="setDays(7)">近7天</button>
    </div>
    <input id="search-box" type="search" placeholder="搜索标题 / 作者 / 期刊" oninput="renderArticles()">
    <button id="refresh-btn" onclick="fetchArticles()">刷新</button>
  </div>
  <div id="status"></div>
  <div id="list-area">
    <div id="list-meta"></div>
    <div id="article-list"></div>
    <div id="empty"><div class="icon">📭</div><p>该时间范围内暂无新文章</p><small>可切换到「近3天」或「近7天」查看更多</small></div>
  </div>
</div>

<script>
// ── 分组配置 ──────────────────────────────────────────
// key: 分组名  c: badge文字色  bg: badge背景色
const GROUP_CFG = {

// PubMed source字段（小写）→ { group, displayName }

  "nature cell biology":           { g:"⭐ 顶刊", n:"Nature Cell Biology" },
  "nat neurosci":                  { g:"⭐ 顶刊", n:"Nature Neuroscience" },
  "nature neuroscience":           { g:"⭐ 顶刊", n:"Nature Neuroscience" },
  "nat immunol":                   { g:"⭐ 顶刊", n:"Nature Immunology" },
  "nature immunology":             { g:"⭐ 顶刊", n:"Nature Immunology" },
  "cell stem cell":                { g:"⭐ 顶刊", n:"Cell Stem Cell" },
  "cell metab":                    { g:"⭐ 顶刊", n:"Cell Metabolism" },
  "cell metabolism":               { g:"⭐ 顶刊", n:"Cell Metabolism" },

  "molecular cell":                { g:"📄 其他", n:"Molecular Cell" },
  "sci transl med":                { g:"📄 其他", n:"Sci Transl Med" },
  "science translational medicine":{ g:"📄 其他", n:"Sci Transl Med" },
  "nat commun":                    { g:"📄 其他", n:"Nature Communications" },
  "nature communications":         { g:"📄 其他", n:"Nature Communications" },
  "nat protoc":                    { g:"📄 其他", n:"Nature Protocols" },
  "nature protocols":              { g:"📄 其他", n:"Nature Protocols" },
  "nucleic acids res":             { g:"📄 其他", n:"Nucleic Acids Res" },
  "nucleic acids research":        { g:"📄 其他", n:"Nucleic Acids Res" },
  "sci adv":                       { g:"📄 其他", n:"Science Advances" },
  "science advances":              { g:"📄 其他", n:"Science Advances" },
  "sci signal":                    { g:"📄 其他", n:"Science Signaling" },
  "science signaling":             { g:"📄 其他", n:"Science Signaling" },
  "sci immunol":                   { g:"📄 其他", n:"Science Immunology" },
  "science immunology":            { g:"📄 其他", n:"Science Immunology" },
  "cell host microbe":             { g:"📄 其他", n:"Cell Host & Microbe" },
  "cell host & microbe":           { g:"📄 其他", n:"Cell Host & Microbe" },
  "cell res":                      { g:"📄 其他", n:"Cell Research" },
  "cell research":                 { g:"📄 其他", n:"Cell Research" },
  "circulation":                   { g:"📄 其他", n:"Circulation" },
  "blood":                         { g:"📄 其他", n:"Blood" },
  "biol psychiatry":               { g:"📄 其他", n:"Biological Psychiatry" },
  "biological psychiatry":         { g:"📄 其他", n:"Biological Psychiatry" },
  "proc natl acad sci u s a":      { g:"📄 其他", n:"PNAS" },
  "elife":                         { g:"📄 其他", n:"eLife" },
  "dev cell":                      { g:"📄 其他", n:"Developmental Cell" },
  "developmental cell":            { g:"📄 其他", n:"Developmental Cell" },
  "curr biol":                     { g:"📄 其他", n:"Current Biology" },
  "current biology":               { g:"📄 其他", n:"Current Biology" },
  "cell rep":                      { g:"📄 其他", n:"Cell Reports" },
  "cell reports":                  { g:"📄 其他", n:"Cell Reports" },
  "cell death dis":                { g:"📄 其他", n:"Cell Death & Disease" },
  "cell death differ":             { g:"📄 其他", n:"Cell Death & Differ." },
  "mov disord":                    { g:"📄 其他", n:"Movement Disorders" },
  "movement disorders":            { g:"📄 其他", n:"Movement Disorders" },
  "brief bioinform":               { g:"📄 其他", n:"Brief. Bioinformatics" },
  "briefings in bioinformatics":   { g:"📄 其他", n:"Brief. Bioinformatics" },
  "schizophr bull":                { g:"📄 其他", n:"Schizophrenia Bulletin" },
  "schizophrenia bulletin":        { g:"📄 其他", n:"Schizophrenia Bulletin" },
  "neuroimage":                    { g:"📄 其他", n:"Neuroimage" },
  "faseb j":                       { g:"📄 其他", n:"FASEB Journal" },
  "j neurosci":                    { g:"📄 其他", n:"J. Neuroscience" },
  "journal of neuroscience":       { g:"📄 其他", n:"J. Neuroscience" },
  "glia":                          { g:"📄 其他", n:"Glia" },
  "development":                   { g:"📄 其他", n:"Development" },
  "hum brain mapp":                { g:"📄 其他", n:"Human Brain Mapping" },
  "human brain mapping":           { g:"📄 其他", n:"Human Brain Mapping" },
  "star protoc":                   { g:"📄 其他", n:"STAR Protocols" },
  "cereb cortex":                  { g:"📄 其他", n:"Cerebral Cortex" },
  "cerebral cortex":               { g:"📄 其他", n:"Cerebral Cortex" },
  "j alzheimers dis":              { g:"📄 其他", n:"J. Alzheimer's Disease" },
  "j biol chem":                   { g:"📄 其他", n:"J. Biological Chemistry" },
  "journal of biological chemistry":{ g:"📄 其他", n:"J. Biological Chemistry" },
};

// PubMed 查询词（用于 esearch）
const SEARCH_QUERIES = [
  '"Nature"[Journal]',
  '"Science"[Journal]',
  '"Cell"[Journal]',
  '"N Engl J Med"[Journal]',
  '"Lancet"[Journal]',
  '"Nat Med"[Journal]',
  '"Nat Biotechnol"[Journal]',
  '"Nat Genet"[Journal]',
  '"Nat Methods"[Journal]',
  '"Nat Cell Biol"[Journal]',
  '"Nat Neurosci"[Journal]',
  '"Nat Immunol"[Journal]',
  '"Cell Stem Cell"[Journal]',
  '"Cell Metab"[Journal]',
  '"Cancer Cell"[Journal]',
  '"Immunity"[Journal]',
  '"Neuron"[Journal]',
  '"Natl Sci Rev"[Journal]',
  '"Nat Rev Drug Discov"[Journal]',
  '"Nat Rev Mol Cell Biol"[Journal]',
  '"Nat Rev Cancer"[Journal]',
  '"Nat Rev Immunol"[Journal]',
  '"Nat Rev Genet"[Journal]',
  '"Nat Rev Neurol"[Journal]',
  '"Nat Rev Neurosci"[Journal]',
  '"Nat Rev Endocrinol"[Journal]',
  '"Mol Cell"[Journal]',
  '"Sci Transl Med"[Journal]',
  '"Nat Commun"[Journal]',
  '"Nat Protoc"[Journal]',
  '"Nucleic Acids Res"[Journal]',
  '"Sci Adv"[Journal]',
  '"Sci Signal"[Journal]',
  '"Sci Immunol"[Journal]',
  '"Cell Host Microbe"[Journal]',
  '"Cell Res"[Journal]',
  '"Circulation"[Journal]',
  '"Blood"[Journal]',
  '"Biol Psychiatry"[Journal]',
  '"Proc Natl Acad Sci U S A"[Journal]',
  '"Elife"[Journal]',
  '"Dev Cell"[Journal]',
  '"Curr Biol"[Journal]',
  '"Cell Rep"[Journal]',
  '"Cell Death Dis"[Journal]',
  '"Cell Death Differ"[Journal]',
  '"Mov Disord"[Journal]',
  '"Brief Bioinform"[Journal]',
  '"Schizophr Bull"[Journal]',
  '"Neuroimage"[Journal]',
  '"FASEB J"[Journal]',
  '"J Neurosci"[Journal]',
  '"Glia"[Journal]',
  '"Development"[Journal]',
  '"Hum Brain Mapp"[Journal]',
  '"STAR Protoc"[Journal]',
  '"Cereb Cortex"[Journal]',
  '"J Alzheimers Dis"[Journal]',
  '"J Biol Chem"[Journal]',
];

// ── State ──────────────────────────────────────────────
const BASE = "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/";
let days = 3, articles = [], hiddenGroups = new Set(), groupCounts = {};
const GROUPS = Object.keys(GROUP_CFG);
const chunk = (a, n) => Array.from({length: Math.ceil(a.length/n)}, (_,i) => a.slice(i*n, i*n+n));
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Lookup helper ──────────────────────────────────────
function lookupJournal(pubmedSource) {
  if (!pubmedSource) return null;
  const key = pubmedSource.toLowerCase().trim();
  if (JOURNAL_MAP[key]) return JOURNAL_MAP[key];
  // partial match fallback
  for (const [k, v] of Object.entries(JOURNAL_MAP)) {
    if (key.startsWith(k) || k.startsWith(key)) return v;
  }
  return null;
}

// ── Sidebar ────────────────────────────────────────────
function buildSidebar() {
  const el = document.getElementById("sb-list");
  el.innerHTML = "";
  GROUPS.forEach(g => {
    const {c} = GROUP_CFG[g];
    const on = !hiddenGroups.has(g);
    const wrap = document.createElement("div");
    wrap.className = "sb-group";
    wrap.innerHTML = `
      <div class="sb-group-header">${g}</div>
      <div class="sb-item" id="sb-${CSS.escape(g)}" onclick="toggleGroup('${g.replace(/'/g,"\\'")}')">
        <div class="sb-check ${on?"on":""}" style="${on?`background:${c};border-color:${c}`:""}"></div>
        <span class="sb-label">全部</span>
        <span class="sb-count" id="cnt-${CSS.escape(g)}">${groupCounts[g]||""}</span>
      </div>`;
    el.appendChild(wrap);
  });
}

function refreshSidebarItem(g) {
  const {c} = GROUP_CFG[g];
  const on = !hiddenGroups.has(g);
  const item = document.getElementById("sb-" + CSS.escape(g));
  if (!item) return;
  const chk = item.querySelector(".sb-check");
  chk.className = "sb-check" + (on?" on":"");
  chk.style.background = on ? c : "";
  chk.style.borderColor = on ? c : "";
}

function updateCounts() {
  GROUPS.forEach(g => {
    const el = document.getElementById("cnt-" + CSS.escape(g));
    if (el) el.textContent = groupCounts[g] || "";
  });
}

function toggleGroup(g) {
  hiddenGroups.has(g) ? hiddenGroups.delete(g) : hiddenGroups.add(g);
  refreshSidebarItem(g);
  renderArticles();
}

function selectAll() { hiddenGroups.clear(); GROUPS.forEach(g => refreshSidebarItem(g)); renderArticles(); }
function clearAll()  { GROUPS.forEach(g => { hiddenGroups.add(g); refreshSidebarItem(g); }); renderArticles(); }

// ── Days ───────────────────────────────────────────────
function setDays(d) {
  days = d;
  document.querySelectorAll(".day-btn").forEach(b => b.classList.toggle("active", +b.dataset.d === d));
  fetchArticles();
}

// ── Fetch ──────────────────────────────────────────────
function setStatus(msg, isErr) {
  const el = document.getElementById("status");
  if (!msg) { el.style.display = "none"; return; }
  el.style.display = "flex";
  el.className = isErr ? "err" : "";
  el.innerHTML = isErr
    ? `<span>⚠️ ${msg}</span>`
    : `<div class="spinner"></div><span>${msg}</span>`;
}

async function fetchArticles() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  articles = []; groupCounts = {};
  setStatus("正在查询 PubMed...");

  try {
    const batches = chunk(SEARCH_QUERIES, 10);
    const allIds = [];

    for (let i = 0; i < batches.length; i++) {
      setStatus(`查询中 ${Math.min((i+1)*10, SEARCH_QUERIES.length)} / ${SEARCH_QUERIES.length} 个期刊...`);
      const term = batches[i].join(" OR ");
      const url = BASE + "esearch.fcgi?db=pubmed&term=" + encodeURIComponent(term)
        + "&datetype=edat&reldate=" + days + "&retmax=500&retmode=json";
      const res = await fetch(url);
      const data = await res.json();
      allIds.push(...(data.esearchresult?.idlist || []));
      if (i < batches.length - 1) await sleep(340);
    }

    const uniqueIds = [...new Set(allIds)];
    if (uniqueIds.length === 0) {
      renderArticles(); setStatus(""); btn.disabled = false; return;
    }

    setStatus(`获取 ${uniqueIds.length} 篇文章详情...`);
    const idBatches = chunk(uniqueIds, 200);
    const merged = {};
    for (let i = 0; i < idBatches.length; i++) {
      const res = await fetch(BASE + "esummary.fcgi?db=pubmed&id=" + idBatches[i].join(",") + "&retmode=json");
      const data = await res.json();
      Object.assign(merged, data.result || {});
      if (i < idBatches.length - 1) await sleep(340);
    }

    articles = uniqueIds
      .map(id => merged[id])
      .filter(a => a && a.uid && a.title && a.title !== "Unknown title")
      .map(a => {
        const meta = lookupJournal(a.source) || { g:"📄 其他", n: a.source || "Unknown" };
        const gcfg = GROUP_CFG[meta.g] || GROUP_CFG["📄 其他"];
        return {
          id: a.uid,
          title: a.title,
          displayJournal: meta.n,
          group: meta.g,
          color: gcfg.c,
          bg: gcfg.bg,
          authors: a.authors?.length
            ? a.authors.slice(0,3).map(x => x.name).join(", ") + (a.authors.length > 3 ? " et al." : "")
            : "",
          date: a.epubdate || a.pubdate || "",
          url: "https://pubmed.ncbi.nlm.nih.gov/" + a.uid + "/",
        };
      })
      .sort((a, b) => new Date(b.date) - new Date(a.date));

    groupCounts = {};
    articles.forEach(a => { groupCounts[a.group] = (groupCounts[a.group] || 0) + 1; });
    updateCounts();
    document.getElementById("updated").textContent =
      "· 更新 " + new Date().toLocaleTimeString("zh-CN", {hour:"2-digit", minute:"2-digit"});
    setStatus("");
  } catch(e) {
    setStatus("加载失败：" + e.message, true);
  }

  renderArticles();
  btn.disabled = false;
}

// ── Render ─────────────────────────────────────────────
function renderArticles() {
  const q = document.getElementById("search-box").value.trim().toLowerCase();
  const list = document.getElementById("article-list");
  const empty = document.getElementById("empty");
  const meta = document.getElementById("list-meta");

  const filtered = articles.filter(a => {
    if (hiddenGroups.has(a.group)) return false;
    if (q && !a.title.toLowerCase().includes(q)
          && !a.displayJournal.toLowerCase().includes(q)
          && !a.authors.toLowerCase().includes(q)) return false;
    return true;
  });

  meta.textContent = filtered.length ? `共 ${filtered.length} 篇文章` : "";
  empty.style.display = filtered.length === 0 ? "flex" : "none";
  list.innerHTML = filtered.map(a => `
    <div class="article-card">
      <a class="article-title" href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
      <div class="article-meta">
        <span class="journal-badge" style="background:${a.bg};color:${a.color}">${a.displayJournal}</span>
        <span class="article-authors">${a.authors}</span>
        <span class="article-date">${a.date}</span>
      </div>
    </div>`).join("");
}

// ── Init ───────────────────────────────────────────────
buildSidebar();
fetchArticles();
</script>
</body>
</html>
